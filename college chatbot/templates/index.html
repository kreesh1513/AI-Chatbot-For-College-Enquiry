<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Enquiry Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 College Enquiry Bot</h1>
        </div>
        
        <!-- Static main menu - hidden after first interaction -->
        <div id="main-menu" class="menu-options">
            <div class="option" data-value="courses">Courses</div>
            <div class="option" data-value="fees">Fees</div>
            <div class="option" data-value="admission">Admission</div>
            <div class="option" data-value="hostel">Hostel</div>
            <div class="option" data-value="placement">Placement</div>
        </div>
        
        <div id="chat-messages" class="chat-messages">
            <!-- Initial welcome will be added by JS -->
        </div>
        
        <!-- Dynamic buttons from bot responses -->
        <div id="dynamic-buttons" class="dynamic-buttons"></div>
        
        <div class="chat-input-container">
            <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const dynamicButtons = document.getElementById('dynamic-buttons');
        const mainMenu = document.getElementById('main-menu');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let firstInteraction = true;

        // Init: Show welcome + main buttons
        window.addEventListener('load', () => {
            sendMessage('');  // Empty triggers welcome
        });

        // Bind main menu clicks
        document.querySelectorAll('#main-menu .option').forEach(option => {
            option.addEventListener('click', () => {
                hideMainMenu();
                sendMessage(option.getAttribute('data-value'));
            });
        });

        // Bind dynamic buttons (delegation)
        dynamicButtons.addEventListener('click', (e) => {
            if (e.target.classList.contains('option')) {
                sendMessage(e.target.getAttribute('data-value'));
            }
        });

        // Send button and Enter
        sendBtn.addEventListener('click', () => sendMessage());
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        async function sendMessage(message = null) {
            const inputMessage = message || userInput.value.trim();
            if (inputMessage === '' && !firstInteraction) return;

            if (inputMessage && firstInteraction) {
                hideMainMenu();
                firstInteraction = false;
            }

            // Add user message bubble (if not empty/system)
            if (inputMessage) {
                addMessage(inputMessage, 'user');
                userInput.value = '';
            }

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: inputMessage || '' })
                });
                
                const data = await response.json();
                addMessage(data.response, 'bot');
                
                // Render dynamic buttons
                renderButtons(data.buttons);
                
            } catch (error) {
                addMessage('Sorry, something went wrong. Please refresh.', 'bot');
            }
        }

        function hideMainMenu() {
            mainMenu.style.display = 'none';
        }

        function renderButtons(buttons) {
            dynamicButtons.innerHTML = '';  // Clear previous
            if (!buttons || buttons.length === 0) {
                dynamicButtons.style.display = 'none';
                return;
            }
            
            buttons.forEach(btn => {
                const option = document.createElement('div');
                option.className = 'option';
                option.setAttribute('data-value', btn.value);
                option.textContent = btn.label;
                dynamicButtons.appendChild(option);
            });
            dynamicButtons.style.display = 'flex';
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
</body>
</html>
